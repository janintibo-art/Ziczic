name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Générer le wrapper Gradle
        run: gradle wrapper --gradle-version 8.7

      - name: Compiler l'APK (debug, installable)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ZicZic.apk

      - name: Mettre l'APK en téléchargement (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ZicZic-apk
          path: ZicZic.apk
          if-no-files-found: error

      - name: Publier dans la Release "latest"
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ZicZic — dernière version
          body: APK compilé automatiquement. Téléchargez ZicZic.apk ci-dessous.
          files: ZicZic.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
